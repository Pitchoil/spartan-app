<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#000000">
    <title>SpartanFitness</title>
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        *{-webkit-tap-highlight-color:transparent;box-sizing:border-box;}

        /* ── 3-column stats ──────────────────── */
        .stats-row-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:16px;}
        .stat-card-sm{background:var(--card);border-radius:10px;padding:12px 6px;text-align:center;border:1px solid #2a2a2a;}
        .stat-card-sm i{font-size:1.2rem;color:var(--gold);display:block;margin-bottom:4px;}
        .stat-card-sm span{font-size:1.3rem;font-weight:bold;color:white;display:block;}
        .stat-card-sm .stat-label{font-size:0.65rem;color:#666;margin-top:2px;}
        .stat-card-sm.burn i{color:#2ecc71;}
        .stat-card-sm.burn span{color:#2ecc71;}

        /* ── Missed day button ───────────────── */
        .missed-btn{width:100%;padding:10px;background:#1a1a1a;color:#aaa;border:1px dashed #444;
            border-radius:8px;font-size:0.8rem;cursor:pointer;margin-top:10px;text-align:left;}
        .missed-btn:hover{background:#222;}

        /* ── Weekly chart ────────────────────── */
        .chart-area{background:#1a0808;border-radius:10px;padding:12px;margin-bottom:5px;}
        .chart-row{display:flex;align-items:flex-end;height:60px;gap:2px;margin-bottom:4px;}
        .chart-labels{display:flex;gap:2px;}
        .chart-day-col{flex:1;display:flex;flex-direction:column;align-items:center;}
        .chart-day-col .bar{width:80%;border-radius:3px 3px 0 0;transition:height .3s;}
        .chart-day-col .day-lbl{font-size:10px;color:#888;margin-top:2px;}
        .chart-day-col .sets-lbl{font-size:9px;color:#666;}
        .chart-day-col .burn-lbl{font-size:9px;color:#2ecc71;}
        .chart-progress-btn{width:100%;margin-top:8px;padding:7px;background:transparent;
            border:1px solid #333;color:#888;border-radius:6px;font-size:0.75rem;cursor:pointer;}
        .chart-progress-btn:hover{background:#222;color:#E6C288;}

        /* ── Progress history modal ──────────── */
        #progress-modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.9);
            z-index:9999;flex-direction:column;overflow:hidden;}
        .prog-modal-inner{background:#111;width:100%;height:100%;display:flex;flex-direction:column;}
        .prog-header{display:flex;align-items:center;justify-content:space-between;
            padding:14px 16px;border-bottom:1px solid #222;background:#0d0d0d;}
        .prog-header h3{margin:0;color:var(--gold);font-size:1rem;}
        .prog-nav{display:flex;align-items:center;gap:8px;}
        .prog-nav button{background:#222;border:1px solid #333;color:#aaa;padding:6px 12px;
            border-radius:6px;cursor:pointer;font-size:0.85rem;}
        .prog-nav button:disabled{opacity:.3;cursor:default;}
        #prog-week-label{color:#E6C288;font-size:0.85rem;font-weight:bold;text-align:center;}
        .prog-body{flex:1;overflow-y:auto;padding:14px 16px;}
        .prog-stat-card{background:#1a1a1a;border:1px solid #333;border-radius:8px;
            padding:10px;text-align:center;}
        .prog-stat-card b{font-size:1.3rem;display:block;color:white;}
        .prog-stat-card small{color:#666;font-size:0.72rem;}
        .prog-close-btn{width:calc(100% - 32px);margin:0 16px 16px;padding:12px;
